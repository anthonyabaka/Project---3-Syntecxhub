<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <header class="page-header">
            <h1>Image Gallery</h1>
            <p>Hover over an image to reveal the caption.</p>
        </header>

        <div class="gallery-container">
            <div class="gallery-item">
                <img src="Images/Mountain Mist.jpg.avif" alt="Mountain Mist">
                <div class="caption">
                    <h3>Mountain Mist</h3>
                    <p>Nature Photography</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="Images/Deep Forest.jpg.avif" alt="Deep Forest">
                <div class="caption">
                    <h3>Deep Forest</h3>
                    <p>Wilderness</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="Images/Serene Lake.jpg.avif" alt="Serene Lake">
                <div class="caption">
                    <h3>Serene Lake</h3>
                    <p>Tranquility</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
